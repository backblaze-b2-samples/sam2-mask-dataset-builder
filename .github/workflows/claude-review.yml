name: CI Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

# AI review (code review, B2 standards, security) is handled by a local agent
# run against this repo. Once Claude Managed Agents is available, this will
# move to a hosted agent triggered by the PR webhook — no credentials needed
# in this workflow. See backblaze-labs/demand-side-ai#195.

jobs:
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install uv
          uv pip install --system -r requirements.txt

      - name: Run Python tests
        working-directory: services/api
        run: |
          if [ -d "tests" ] && find tests \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            uv pip install --system pytest
            python -m pytest tests/
          else
            echo "No tests found — skipping. See backblaze-labs/demand-side-ai#195 for test scaffolding work."
          fi

      - name: Set up Node
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: corepack enable

      - name: Check CI workflow security
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";

          const workflow = readFileSync(".github/workflows/claude-review.yml", "utf8");
          const permissionsBlock =
            workflow.match(/^permissions:\s*\n((?:  [^\n]+\n?)*)/m)?.[1] ?? "";
          const permissionLines = permissionsBlock
            .trimEnd()
            .split("\n")
            .filter(Boolean)
            .map((line) => line.trim());
          const checkoutSteps =
            workflow.match(/^      - uses: actions\/checkout@[^\s#]+\n(?:        .*\n)*/gm) ?? [];
          const installStep =
            workflow.match(/^      - name: Install frontend dependencies\n(?:        .*\n)*/m)?.[0] ?? "";
          const failures = [];

          function assertWorkflow(condition, message) {
            if (!condition) failures.push(message);
          }

          assertWorkflow(
            permissionLines.length === 1 &&
              permissionLines[0] === "contents: read" &&
              !/^\s{2,}permissions:/m.test(workflow),
            "workflow must set only top-level permissions: contents: read",
          );
          assertWorkflow(
            checkoutSteps.length > 0 &&
              checkoutSteps.every((step) =>
                /(^|\n)\s+persist-credentials:\s*["']?false["']?\s*(?:#.*)?(?:\n|$)/.test(step),
              ),
            "checkout must set persist-credentials: false",
          );
          assertWorkflow(
            !/(^|\n)\s+cache:\s*["']?pnpm["']?\s*(?:#.*)?(?:\n|$)/.test(workflow),
            "workflow must not use cache: pnpm while PR CI relies on Corepack",
          );
          assertWorkflow(
            /pnpm install\b[^\n]*--frozen-lockfile/.test(installStep) &&
              /(^|[\s;&|])--ignore-scripts(?=$|[\s;&|])/.test(installStep) &&
              !/(^|[\s;&|])--ignore-scripts\s*=/.test(installStep) &&
              !/(^|[\s;&|])--ignore-scripts\s+(?![-;&|]|$)[^\s;&|]+/.test(installStep),
            "frontend install must use pnpm install --frozen-lockfile --ignore-scripts",
          );

          if (failures.length > 0) {
            console.error("CI workflow security check failed:");
            for (const failure of failures) console.error(`- ${failure}`);
            process.exit(1);
          }
          console.log("CI workflow security check passed");
          EOF

      - name: Install frontend dependencies
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck frontend
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: pnpm typecheck
